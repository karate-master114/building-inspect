<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>建物診断アプリ</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d1a;
      --bg2: #13132a;
      --bg3: #1a1a35;
      --accent: #5865f2;
      --accent-dark: #4752c4;
      --accent-light: #7983f5;
      --text: #e8e8f0;
      --text-muted: #8888aa;
      --border: #2a2a4a;
      --green: #3ba55c;
      --yellow: #faa61a;
      --red: #ed4245;
      --green-bg: rgba(59,165,92,0.15);
      --yellow-bg: rgba(250,166,26,0.15);
      --red-bg: rgba(237,66,69,0.15);
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      font-size: 16px;
      line-height: 1.6;
    }

    body {
      padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
    }

    .app-header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .app-header h1 {
      font-size: 20px;
      font-weight: 700;
      color: var(--accent-light);
      letter-spacing: 0.02em;
    }

    .app-header p {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }

    .card-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--accent-light);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-title .icon {
      width: 22px;
      height: 22px;
      background: var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      flex-shrink: 0;
    }

    label {
      display: block;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 6px;
      font-weight: 500;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      color: var(--text);
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: var(--accent);
    }

    .form-group {
      margin-bottom: 14px;
    }

    .api-key-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .api-key-row input {
      flex: 1;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 20px;
      border-radius: 8px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      min-height: 48px;
      transition: background 0.2s, opacity 0.2s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }

    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      width: 100%;
    }

    .btn-primary:hover:not(:disabled) { background: var(--accent-dark); }

    .btn-secondary {
      background: var(--bg3);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-sm {
      padding: 8px 14px;
      font-size: 13px;
      min-height: 36px;
    }

    .btn-success {
      background: var(--green);
      color: #fff;
      width: 100%;
    }

    .btn-success:hover:not(:disabled) { background: #2d8e4e; }

    /* 画像アップロード */
    .upload-area {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 28px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    .upload-area:hover, .upload-area.dragover {
      border-color: var(--accent);
      background: rgba(88,101,242,0.05);
    }

    .upload-area input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .upload-icon {
      font-size: 36px;
      margin-bottom: 10px;
    }

    .upload-area p {
      color: var(--text-muted);
      font-size: 14px;
    }

    .upload-area .upload-hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .preview-item {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      aspect-ratio: 1;
      background: var(--bg3);
    }

    .preview-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .preview-item .remove-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 22px;
      height: 22px;
      background: rgba(0,0,0,0.7);
      border: none;
      border-radius: 50%;
      color: #fff;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }

    /* ローディング */
    .loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(13,13,26,0.85);
      z-index: 200;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    .loading-overlay.active { display: flex; }

    .spinner {
      width: 56px;
      height: 56px;
      border: 4px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      color: var(--text-muted);
      font-size: 15px;
    }

    /* 診断結果 */
    #result-section { display: none; }

    .score-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--bg3);
      border-radius: 10px;
      padding: 14px 18px;
      margin-bottom: 16px;
      width: 100%;
    }

    .score-circle {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 3px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 800;
      color: var(--accent-light);
      flex-shrink: 0;
    }

    .score-info .overall-label {
      font-size: 13px;
      color: var(--text-muted);
    }

    .score-info .overall-value {
      font-size: 20px;
      font-weight: 700;
    }

    .overall-good   { color: var(--green); }
    .overall-warn   { color: var(--yellow); }
    .overall-bad    { color: var(--red); }
    .overall-urgent { color: var(--red); }

    .diagnosis-item {
      background: var(--bg3);
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 10px;
      border-left: 4px solid var(--border);
    }

    .diagnosis-item.severity-mild   { border-left-color: var(--green); }
    .diagnosis-item.severity-medium { border-left-color: var(--yellow); }
    .diagnosis-item.severity-severe { border-left-color: var(--red); }

    .diagnosis-item-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      flex-wrap: wrap;
      gap: 6px;
    }

    .part-name {
      font-weight: 700;
      font-size: 15px;
    }

    .severity-badge {
      font-size: 12px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
    }

    .severity-mild   { background: var(--green-bg);  color: var(--green); }
    .severity-medium { background: var(--yellow-bg); color: var(--yellow); }
    .severity-severe { background: var(--red-bg);    color: var(--red); }

    .diagnosis-item-body {
      font-size: 14px;
      color: var(--text-muted);
    }

    .diagnosis-item-body .condition {
      margin-bottom: 4px;
      color: var(--text);
    }

    .diagnosis-item-body .action {
      color: var(--accent-light);
      font-size: 13px;
      margin-bottom: 4px;
    }

    .diagnosis-item-body .cost {
      font-size: 13px;
      font-weight: 600;
      color: var(--yellow);
    }

    .total-cost {
      background: rgba(88,101,242,0.12);
      border: 1px solid var(--accent);
      border-radius: 10px;
      padding: 14px 18px;
      text-align: center;
      margin-top: 10px;
      margin-bottom: 16px;
    }

    .total-cost .label { font-size: 13px; color: var(--text-muted); }
    .total-cost .amount { font-size: 24px; font-weight: 800; color: var(--accent-light); }

    .notes-box {
      background: var(--bg3);
      border-radius: 10px;
      padding: 14px;
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 16px;
      line-height: 1.7;
    }

    /* エラー */
    .error-msg {
      background: var(--red-bg);
      border: 1px solid var(--red);
      border-radius: 8px;
      padding: 12px 14px;
      color: var(--red);
      font-size: 14px;
      margin-bottom: 14px;
      display: none;
    }

    .error-msg.active { display: block; }

    /* サクセス */
    .success-msg {
      background: var(--green-bg);
      border: 1px solid var(--green);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--green);
      font-size: 13px;
      margin-top: 8px;
      display: none;
    }

    .success-msg.active { display: block; }

    /* セクション区切り */
    .section-gap { height: 4px; }

    /* フッター */
    .app-footer {
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
      padding: 20px;
    }

    @media (max-width: 400px) {
      .container { padding: 14px 12px 40px; }
      .card { padding: 16px; }
    }
  </style>
</head>
<body>

<!-- ローディングオーバーレイ -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">AIが建物を診断中...</div>
</div>

<!-- ヘッダー -->
<header class="app-header">
  <h1>🏗️ 建物診断アプリ</h1>
  <p>写真から劣化診断・概算見積を自動生成</p>
</header>

<div class="container">

  <!-- APIキー設定 -->
  <div class="card">
    <div class="card-title">
      <div class="icon">🔑</div>
      Gemini APIキー設定
    </div>
    <div class="form-group">
      <label for="apiKeyInput">APIキー（AIza...）</label>
      <div class="api-key-row">
        <input type="password" id="apiKeyInput" placeholder="AIza..." autocomplete="off" spellcheck="false">
        <button class="btn btn-secondary btn-sm" onclick="saveApiKey()">保存</button>
      </div>
      <div class="success-msg" id="apiKeySaved">✓ 保存しました</div>
    </div>
  </div>

  <!-- 建物情報入力 -->
  <div class="card">
    <div class="card-title">
      <div class="icon">🏢</div>
      建物情報
    </div>
    <div class="form-group">
      <label for="buildingName">建物名称</label>
      <input type="text" id="buildingName" placeholder="例：○○マンション101号棟">
    </div>
    <div class="form-group">
      <label for="buildingAddress">住所</label>
      <input type="text" id="buildingAddress" placeholder="例：東京都渋谷区...">
    </div>
    <div class="form-group" style="margin-bottom:0">
      <label for="inspectorName">担当者名</label>
      <input type="text" id="inspectorName" placeholder="例：田中 太郎">
    </div>
  </div>

  <!-- 画像アップロード -->
  <div class="card">
    <div class="card-title">
      <div class="icon">📷</div>
      建物写真のアップロード（最大5枚）
    </div>
    <div class="upload-area" id="uploadArea">
      <input type="file" id="fileInput" accept="image/*" multiple capture="environment" onchange="handleFiles(this.files)">
      <div class="upload-icon">📸</div>
      <p>タップして写真を選択 / 撮影</p>
      <p class="upload-hint">外壁・屋根・基礎など複数部位の写真を<br>選択すると精度が上がります</p>
    </div>
    <div class="preview-grid" id="previewGrid"></div>
  </div>

  <!-- エラー表示 -->
  <div class="error-msg" id="errorMsg"></div>

  <!-- 診断ボタン -->
  <button class="btn btn-primary" id="diagnoseBtn" onclick="startDiagnosis()">
    🔍 AIで建物診断を開始
  </button>

  <div class="section-gap"></div>

  <!-- 診断結果 -->
  <div id="result-section">

    <div class="card">
      <div class="card-title">
        <div class="icon">📊</div>
        診断結果
      </div>

      <!-- スコア・総合評価 -->
      <div class="score-badge">
        <div class="score-circle" id="scoreCircle">--</div>
        <div class="score-info">
          <div class="overall-label">総合評価</div>
          <div class="overall-value" id="overallValue">--</div>
        </div>
      </div>

      <!-- 診断項目 -->
      <div id="diagnosisItems"></div>

      <!-- 合計費用 -->
      <div class="total-cost">
        <div class="label">概算修繕費用（合計）</div>
        <div class="amount" id="totalCost">-- 万円</div>
      </div>

      <!-- 総合コメント -->
      <div class="notes-box" id="notesBox"></div>

      <!-- PDF出力ボタン -->
      <button class="btn btn-success" onclick="generatePDF()">
        📄 PDF見積書を出力
      </button>
    </div>

  </div>

</div>

<div class="app-footer">
  ※ この診断はAIによる概算です。正確な診断・費用は現地調査が必要です。
</div>

<script>
  // ===== グローバル変数 =====
  let uploadedImages = []; // { file, base64, dataUrl }
  let diagnosisResult = null;

  // ===== 初期化 =====
  window.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem('building_api_key');
    if (saved) {
      document.getElementById('apiKeyInput').value = saved;
    }
    setupDragDrop();
  });

  // ===== APIキー保存 =====
  function saveApiKey() {
    const key = document.getElementById('apiKeyInput').value.trim();
    if (!key) { showError('APIキーを入力してください。'); return; }
    localStorage.setItem('building_api_key', key);
    const msg = document.getElementById('apiKeySaved');
    msg.classList.add('active');
    setTimeout(() => msg.classList.remove('active'), 2000);
  }

  // ===== ドラッグ＆ドロップ =====
  function setupDragDrop() {
    const area = document.getElementById('uploadArea');
    area.addEventListener('dragover', (e) => { e.preventDefault(); area.classList.add('dragover'); });
    area.addEventListener('dragleave', () => area.classList.remove('dragover'));
    area.addEventListener('drop', (e) => {
      e.preventDefault();
      area.classList.remove('dragover');
      handleFiles(e.dataTransfer.files);
    });
  }

  // ===== ファイル処理 =====
  function handleFiles(files) {
    const remaining = 5 - uploadedImages.length;
    if (remaining <= 0) { showError('写真は最大5枚までです。'); return; }
    const toAdd = Array.from(files).slice(0, remaining);
    clearError();

    toAdd.forEach(file => {
      if (!file.type.startsWith('image/')) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        const dataUrl = e.target.result;
        const base64 = dataUrl.split(',')[1];
        uploadedImages.push({ file, base64, dataUrl });
        renderPreviews();
      };
      reader.readAsDataURL(file);
    });
  }

  function renderPreviews() {
    const grid = document.getElementById('previewGrid');
    grid.innerHTML = '';
    uploadedImages.forEach((img, i) => {
      const div = document.createElement('div');
      div.className = 'preview-item';
      div.innerHTML = `
        <img src="${img.dataUrl}" alt="建物写真${i+1}">
        <button class="remove-btn" onclick="removeImage(${i})">✕</button>
      `;
      grid.appendChild(div);
    });
  }

  function removeImage(index) {
    uploadedImages.splice(index, 1);
    renderPreviews();
    clearError();
  }

  // ===== エラー表示 =====
  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('active');
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function clearError() {
    const el = document.getElementById('errorMsg');
    el.textContent = '';
    el.classList.remove('active');
  }

  // ===== ローディング =====
  function showLoading(text) {
    document.getElementById('loadingText').textContent = text || 'AIが建物を診断中...';
    document.getElementById('loadingOverlay').classList.add('active');
  }

  function hideLoading() {
    document.getElementById('loadingOverlay').classList.remove('active');
  }

  // ===== 診断実行 =====
  async function startDiagnosis() {
    clearError();

    const apiKey = document.getElementById('apiKeyInput').value.trim()
                || localStorage.getItem('building_api_key') || '';
    if (!apiKey) { showError('Gemini APIキーを入力・保存してください。'); return; }
    if (uploadedImages.length === 0) { showError('建物の写真を1枚以上アップロードしてください。'); return; }

    const btn = document.getElementById('diagnoseBtn');
    btn.disabled = true;
    showLoading('AIが建物を診断中...\n（画像枚数により数十秒かかる場合があります）');

    try {
      const parts = buildGeminiParts();
      const response = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts }],
            generationConfig: { temperature: 0.3, maxOutputTokens: 2000 }
          })
        }
      );

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        const msg = err.error?.message || `HTTPエラー ${response.status}`;
        throw new Error(msg);
      }

      const data = await response.json();
      const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
      let result;
      try {
        // コードブロック除去
        const cleaned = raw.replace(/```json\s*/gi, '').replace(/```\s*/g, '').trim();
        result = JSON.parse(cleaned);
      } catch (e) {
        throw new Error('AIの応答をJSONとして解析できませんでした。再試行してください。\n\n応答内容: ' + raw.slice(0, 200));
      }

      diagnosisResult = result;
      renderResult(result);

    } catch (e) {
      showError('診断中にエラーが発生しました: ' + e.message);
    } finally {
      hideLoading();
      btn.disabled = false;
    }
  }

  function buildGeminiParts() {
    const prompt = `あなたは建物の劣化診断の専門家です。アップロードされた建物の写真を分析して、以下の形式でJSONを返してください。

{
  "overall": "総合評価（良好/要注意/要修繕/緊急）",
  "score": 総合スコア(0-100の数値),
  "items": [
    {
      "part": "部位名（例：外壁、屋根、基礎など）",
      "condition": "状態の説明",
      "severity": "軽微/中程度/重大",
      "action": "推奨される対応",
      "cost_min": 最低費用概算(万円・数値のみ),
      "cost_max": 最高費用概算(万円・数値のみ)
    }
  ],
  "total_cost_min": 合計最低費用(万円),
  "total_cost_max": 合計最高費用(万円),
  "notes": "総合コメント"
}

JSONのみを返してください。マークダウンのコードブロックは不要です。`;

    const parts = [{ text: prompt }];

    uploadedImages.forEach(img => {
      parts.push({
        inline_data: {
          mime_type: img.file.type || 'image/jpeg',
          data: img.base64
        }
      });
    });

    return parts;
  }

  // ===== 結果表示 =====
  function renderResult(r) {
    // スコア
    document.getElementById('scoreCircle').textContent = r.score ?? '--';

    // 総合評価
    const overallEl = document.getElementById('overallValue');
    overallEl.textContent = r.overall ?? '不明';
    overallEl.className = 'overall-value ' + getOverallClass(r.overall);

    // 診断項目
    const container = document.getElementById('diagnosisItems');
    container.innerHTML = '';
    if (Array.isArray(r.items)) {
      r.items.forEach(item => {
        const el = document.createElement('div');
        const sevClass = getSeverityClass(item.severity);
        el.className = `diagnosis-item ${sevClass}`;
        el.innerHTML = `
          <div class="diagnosis-item-header">
            <span class="part-name">${escHtml(item.part || '不明')}</span>
            <span class="severity-badge ${sevClass}">${escHtml(item.severity || '')}</span>
          </div>
          <div class="diagnosis-item-body">
            <div class="condition">${escHtml(item.condition || '')}</div>
            <div class="action">→ ${escHtml(item.action || '')}</div>
            <div class="cost">概算費用：${item.cost_min ?? '?'} 〜 ${item.cost_max ?? '?'} 万円</div>
          </div>
        `;
        container.appendChild(el);
      });
    }

    // 合計費用
    if (r.total_cost_min != null && r.total_cost_max != null) {
      document.getElementById('totalCost').textContent =
        `${r.total_cost_min} 〜 ${r.total_cost_max} 万円`;
    } else {
      document.getElementById('totalCost').textContent = '-- 万円';
    }

    // コメント
    document.getElementById('notesBox').textContent = r.notes || '';

    // セクション表示
    const section = document.getElementById('result-section');
    section.style.display = 'block';
    setTimeout(() => section.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
  }

  function getOverallClass(val) {
    if (!val) return '';
    if (val.includes('良好'))   return 'overall-good';
    if (val.includes('要注意')) return 'overall-warn';
    if (val.includes('要修繕')) return 'overall-bad';
    if (val.includes('緊急'))   return 'overall-urgent';
    return '';
  }

  function getSeverityClass(val) {
    if (!val) return '';
    if (val.includes('軽微'))   return 'severity-mild';
    if (val.includes('中程度')) return 'severity-medium';
    if (val.includes('重大'))   return 'severity-severe';
    return '';
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ===== PDF生成 =====
  function generatePDF() {
    if (!diagnosisResult) { showError('先に診断を実行してください。'); return; }

    showLoading('PDF見積書を生成中...');

    try {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

      const margin = 15;
      const pageW = 210;
      const contentW = pageW - margin * 2;
      let y = margin;

      const LINE_H = 7;
      const SECTION_GAP = 5;

      // --- ヘルパー ---
      function checkPageBreak(needed) {
        if (y + needed > 285) {
          doc.addPage();
          y = margin;
        }
      }

      function drawHLine(color) {
        doc.setDrawColor(...(color || [60, 60, 80]));
        doc.setLineWidth(0.3);
        doc.line(margin, y, margin + contentW, y);
        y += 3;
      }

      function text(str, x, fontSize, style, color) {
        doc.setFontSize(fontSize || 11);
        doc.setFont('helvetica', style || 'normal');
        doc.setTextColor(...(color || [220, 220, 235]));
        doc.text(str, x, y);
        y += LINE_H;
      }

      function textWrap(str, x, w, fontSize, color) {
        doc.setFontSize(fontSize || 10);
        doc.setFont('helvetica', 'normal');
        doc.setTextColor(...(color || [180, 180, 200]));
        const lines = doc.splitTextToSize(str, w);
        lines.forEach(line => {
          checkPageBreak(LINE_H);
          doc.text(line, x, y);
          y += LINE_H;
        });
      }

      // --- 背景 ---
      doc.setFillColor(13, 13, 26);
      doc.rect(0, 0, 210, 297, 'F');

      // --- タイトルバー ---
      doc.setFillColor(88, 101, 242);
      doc.rect(0, 0, 210, 28, 'F');

      doc.setFontSize(16);
      doc.setFont('helvetica', 'bold');
      doc.setTextColor(255, 255, 255);
      doc.text('Building Inspection Report', margin, 12);

      doc.setFontSize(9);
      doc.setFont('helvetica', 'normal');
      doc.setTextColor(200, 205, 255);
      doc.text('(Tatemono Shindan Hokokusho / Gaisankomiitsumori)', margin, 19);

      // 作成日
      const dateStr = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
      doc.setFontSize(9);
      doc.setTextColor(200, 205, 255);
      doc.text('Date: ' + dateStr, margin + contentW, 19, { align: 'right' });

      y = 34;

      // --- 建物情報 ---
      const bname   = document.getElementById('buildingName').value.trim()    || '-';
      const baddr   = document.getElementById('buildingAddress').value.trim() || '-';
      const inspect = document.getElementById('inspectorName').value.trim()   || '-';

      doc.setFillColor(26, 26, 53);
      doc.roundedRect(margin, y - 4, contentW, 30, 3, 3, 'F');

      doc.setFontSize(10);
      doc.setFont('helvetica', 'bold');
      doc.setTextColor(121, 131, 245);
      doc.text('[ Building Information ]', margin + 4, y + 2);
      y += 8;

      const infoRows = [
        ['Name',      romanize(bname)],
        ['Address',   romanize(baddr)],
        ['Inspector', romanize(inspect)]
      ];

      infoRows.forEach(([k, v]) => {
        doc.setFontSize(9);
        doc.setFont('helvetica', 'bold');
        doc.setTextColor(140, 140, 170);
        doc.text(k + ':', margin + 4, y);
        doc.setFont('helvetica', 'normal');
        doc.setTextColor(220, 220, 235);
        doc.text(v.slice(0, 60), margin + 28, y);
        y += 6;
      });

      y += 4;
      drawHLine([40, 40, 70]);
      y += SECTION_GAP;

      // --- 総合評価 ---
      checkPageBreak(30);
      const r = diagnosisResult;

      doc.setFillColor(26, 26, 53);
      doc.roundedRect(margin, y - 4, contentW, 28, 3, 3, 'F');

      // スコアサークル風
      doc.setFillColor(88, 101, 242);
      doc.circle(margin + 14, y + 8, 10, 'F');
      doc.setFontSize(12);
      doc.setFont('helvetica', 'bold');
      doc.setTextColor(255, 255, 255);
      const scoreStr = String(r.score ?? '--');
      doc.text(scoreStr, margin + 14, y + 10, { align: 'center' });

      doc.setFontSize(10);
      doc.setFont('helvetica', 'bold');
      doc.setTextColor(121, 131, 245);
      doc.text('Overall Assessment:', margin + 28, y + 3);

      const overallEn = translateOverall(r.overall);
      doc.setFontSize(14);
      doc.setFont('helvetica', 'bold');
      doc.setTextColor(...getOverallRgb(r.overall));
      doc.text(overallEn, margin + 28, y + 13);

      doc.setFontSize(9);
      doc.setFont('helvetica', 'normal');
      doc.setTextColor(140, 140, 170);
      doc.text('Score (0-100)', margin + 28, y + 20);

      y += 32;
      y += SECTION_GAP;

      // --- 診断項目 ---
      checkPageBreak(12);
      doc.setFontSize(11);
      doc.setFont('helvetica', 'bold');
      doc.setTextColor(121, 131, 245);
      doc.text('[ Inspection Items ]', margin, y);
      y += 8;

      if (Array.isArray(r.items)) {
        r.items.forEach((item, idx) => {
          const boxH = estimateItemHeight(item, doc, contentW);
          checkPageBreak(boxH + 4);

          const sevRgb = getSeverityRgb(item.severity);
          doc.setFillColor(20, 20, 45);
          doc.roundedRect(margin, y - 2, contentW, boxH, 2, 2, 'F');

          // 左ボーダー
          doc.setFillColor(...sevRgb);
          doc.rect(margin, y - 2, 3, boxH, 'F');

          // 部位名
          doc.setFontSize(10);
          doc.setFont('helvetica', 'bold');
          doc.setTextColor(220, 220, 235);
          doc.text(item.part || 'Unknown', margin + 6, y + 4);

          // 重大度バッジ
          const sevLabel = translateSeverity(item.severity);
          const badgeW = doc.getTextWidth(sevLabel) + 8;
          doc.setFillColor(...sevRgb.map(c => Math.round(c * 0.3)));
          doc.roundedRect(margin + contentW - badgeW - 2, y - 1, badgeW, 8, 2, 2, 'F');
          doc.setFontSize(8);
          doc.setFont('helvetica', 'bold');
          doc.setTextColor(...sevRgb);
          doc.text(sevLabel, margin + contentW - badgeW / 2 - 2, y + 4, { align: 'center' });

          y += 10;

          // 状態
          const condLines = doc.splitTextToSize(romanize(item.condition || ''), contentW - 12);
          doc.setFontSize(8.5);
          doc.setFont('helvetica', 'normal');
          doc.setTextColor(180, 180, 210);
          condLines.forEach(l => { doc.text(l, margin + 6, y); y += 5.5; });

          // 対応
          const actLines = doc.splitTextToSize('Action: ' + romanize(item.action || ''), contentW - 12);
          doc.setTextColor(121, 131, 245);
          actLines.forEach(l => { doc.text(l, margin + 6, y); y += 5.5; });

          // 費用
          doc.setFont('helvetica', 'bold');
          doc.setTextColor(250, 166, 26);
          doc.text(`Cost estimate: ${item.cost_min ?? '?'} - ${item.cost_max ?? '?'} man-yen`, margin + 6, y);
          y += 8;
        });
      }

      y += SECTION_GAP;

      // --- 合計費用 ---
      checkPageBreak(22);
      doc.setFillColor(30, 30, 70);
      doc.roundedRect(margin, y - 2, contentW, 20, 3, 3, 'F');
      doc.setDrawColor(88, 101, 242);
      doc.setLineWidth(0.8);
      doc.roundedRect(margin, y - 2, contentW, 20, 3, 3, 'S');

      doc.setFontSize(9);
      doc.setFont('helvetica', 'normal');
      doc.setTextColor(140, 140, 170);
      doc.text('Total Estimated Cost:', margin + 5, y + 5);

      doc.setFontSize(13);
      doc.setFont('helvetica', 'bold');
      doc.setTextColor(121, 131, 245);
      doc.text(
        `${r.total_cost_min ?? '?'} - ${r.total_cost_max ?? '?'} man-yen`,
        margin + contentW - 5, y + 10, { align: 'right' }
      );
      y += 25;

      // --- 総合コメント ---
      if (r.notes) {
        checkPageBreak(16);
        doc.setFontSize(9);
        doc.setFont('helvetica', 'bold');
        doc.setTextColor(121, 131, 245);
        doc.text('[ Overall Comments ]', margin, y);
        y += 6;

        const noteLines = doc.splitTextToSize(romanize(r.notes), contentW);
        doc.setFontSize(8.5);
        doc.setFont('helvetica', 'normal');
        doc.setTextColor(170, 170, 200);
        noteLines.forEach(l => {
          checkPageBreak(6);
          doc.text(l, margin, y);
          y += 5.5;
        });
        y += 4;
      }

      // --- 免責事項 ---
      checkPageBreak(20);
      drawHLine([40, 40, 70]);

      doc.setFontSize(7.5);
      doc.setFont('helvetica', 'normal');
      doc.setTextColor(90, 90, 120);
      const disclaimer = [
        'DISCLAIMER: This report is an AI-generated estimate and does not replace professional on-site inspection.',
        'Actual repair costs may vary significantly. Please consult a qualified building inspector for accurate assessment.',
        '(Kono mitsumori wa AI ni yoru gaisan deari, genchi chosa ga hitsuyodesu.)'
      ];
      disclaimer.forEach(line => {
        checkPageBreak(5);
        doc.text(line, margin, y);
        y += 5;
      });

      // --- ページ番号 ---
      const pageCount = doc.internal.getNumberOfPages();
      for (let i = 1; i <= pageCount; i++) {
        doc.setPage(i);
        doc.setFontSize(8);
        doc.setTextColor(80, 80, 110);
        doc.text(`Page ${i} / ${pageCount}`, 210 - margin, 290, { align: 'right' });
      }

      // 保存
      const filename = `building-report-${new Date().toISOString().slice(0,10)}.pdf`;
      doc.save(filename);

    } catch (e) {
      showError('PDF生成中にエラーが発生しました: ' + e.message);
      console.error(e);
    } finally {
      hideLoading();
    }
  }

  // ===== PDF用ユーティリティ =====

  // 日本語を含む文字列をある程度ローマ字/英語っぽく変換（jsPDFは日本語フォント非対応のため）
  function romanize(str) {
    if (!str) return '';
    // ASCII文字・数字・記号はそのまま残す。日本語は読み仮名変換できないためカタカナ→英字記号に置換
    // 実用的な対処：日本語文字はそのまま含めるが、jsPDFのデフォルトフォントで表示できる範囲で対処
    // → 日本語文字は ?  に置き換えず、そのまま渡す（フォント未対応文字は自動的に □ 等になる）
    // → 注：建物名・住所・氏名など日本語固有情報は英語入力を促す
    return str;
  }

  function translateOverall(val) {
    if (!val) return 'Unknown';
    if (val.includes('良好'))   return 'Good';
    if (val.includes('要注意')) return 'Caution';
    if (val.includes('要修繕')) return 'Repair Needed';
    if (val.includes('緊急'))   return 'Urgent';
    return val;
  }

  function translateSeverity(val) {
    if (!val) return '';
    if (val.includes('軽微'))   return 'Minor';
    if (val.includes('中程度')) return 'Moderate';
    if (val.includes('重大'))   return 'Severe';
    return val;
  }

  function getOverallRgb(val) {
    if (!val) return [200, 200, 200];
    if (val.includes('良好'))   return [59, 165, 92];
    if (val.includes('要注意')) return [250, 166, 26];
    if (val.includes('要修繕')) return [237, 66, 69];
    if (val.includes('緊急'))   return [237, 66, 69];
    return [200, 200, 200];
  }

  function getSeverityRgb(val) {
    if (!val) return [150, 150, 150];
    if (val.includes('軽微'))   return [59, 165, 92];
    if (val.includes('中程度')) return [250, 166, 26];
    if (val.includes('重大'))   return [237, 66, 69];
    return [150, 150, 150];
  }

  function estimateItemHeight(item, doc, w) {
    // 状態・対応のテキスト行数から高さを概算
    const condLines = doc.splitTextToSize(item.condition || '', w - 12).length;
    const actLines  = doc.splitTextToSize('Action: ' + (item.action || ''), w - 12).length;
    return 14 + condLines * 5.5 + actLines * 5.5 + 8;
  }
</script>
</body>
